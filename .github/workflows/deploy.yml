name: Deploy Next JS App via FTP
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22.22.1

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: 🚀 Deploy to Hostinger with FTP-Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}        # ex: ftp.mywebsite.com or IP address of server
          username: ${{ secrets.FTP_USERNAME }}    # ex: u123456789
          password: ${{ secrets.FTP_PASSWORD }}    # ex: MaSuperSecret123!
          protocol: ftp
          local-dir: ./out/
          server-dir: public_html/
